version: '3.9'

services:
  # PostgreSQL Database Service - COMMENTED OUT FOR AWS RDS
  # db:
  #   image: postgres:16-alpine
  #   container_name: hospital_db
  #   environment:
  #     POSTGRES_DB: ${DB_NAME:-healthcare_db}
  #     POSTGRES_USER: ${DB_USER:-postgres}
  #     POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password_123}
  #     POSTGRES_HOST_AUTHENTICATION_METHOD: md5
  #   ports:
  #     - "${DB_PORT:-5432}:5432"
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #     - ./backups:/backups
  #   networks:
  #     - hospital_network
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #   restart: unless-stopped

  # Django Application Service
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hospital_app
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn --bind 0.0.0.0:8000 --workers 3 --timeout 120 --keep-alive 75 learning.wsgi:application"
    environment:
      DEBUG: ${DEBUG:-False}
      SECRET_KEY: ${SECRET_KEY:-django-insecure-^^d4cpyvek($4#t2i@1#=51p6lnw7%(paj+d)5q89j*nr30947}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,web}
      
      # Database Configuration
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: ${DB_NAME:-healthcare_db}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-secure_password_123}
      DB_HOST: db
      DB_PORT: 5432
      
      # reCAPTCHA Configuration
      RECAPTCHA_PUBLIC_KEY: ${RECAPTCHA_PUBLIC_KEY:-6LfjqJssAAAAAMkBpGw_c4M8mTdN0el7ZgX3TllU}
      RECAPTCHA_PRIVATE_KEY: ${RECAPTCHA_PRIVATE_KEY:-6LfjqJssAAAAADZVxQD7hd6Jmwd6cNfCmL4AnFa7}
      RECAPTCHA_DISABLED: ${RECAPTCHA_DISABLED:-True}
      
      # Email Configuration (Optional)
      EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.console.EmailBackend}
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-True}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - .:/app:delegated
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    # Remove depends_on for local db when using AWS RDS
    # depends_on:
    #   db:
    #     condition: service_healthy
    networks:
      - hospital_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/admin/login/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: hospital_nginx
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    depends_on:
      web:
        condition: service_healthy
    networks:
      - hospital_network
    restart: unless-stopped

volumes:
  # postgres_data: (commented out - using AWS RDS)
  #   driver: local
  static_volume:
    driver: local
  media_volume:
    driver: local

networks:
  hospital_network:
    driver: bridge
