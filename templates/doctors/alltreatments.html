{% extends "base.html" %}

{% block content %}

<div class="container mt-4">
    <h2 class="text-center mb-4">Treatments</h2>
<div class="row">
    {% for t in treatments %}
    <div class="col-md-4 mb-4">

        <div class="card p-3 h-100 shadow-sm">

            <!-- CLICKABLE NAME -->
            <h5>
                <a href="{% url 'doctors:treatment_doctors' t.id %}">
                    {{ t.treatment_name }}
                </a>
            </h5>

            <p><strong>Category:</strong> {{ t.category }}</p>

            <p>{{ t.description|truncatewords:15 }}</p>

            <p><strong>Doctor:</strong> {{ t.doctor.name }}</p>

        </div>

    </div>
    {% endfor %}
</div>

</div>
{% endblock %}
