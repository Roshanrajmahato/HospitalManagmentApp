{% extends "base.html" %}

{% block content %}

<div class="container mt-4">
<h3 class="text-center mb-4">Book Appointment</h3>

<div class="col-md-6 offset-md-3">

    <form method="POST" >
        {% csrf_token %}

        <div class="mb-3">
        <label>Doctor</label>
        <input type="text" value="{{ doctor.name }}" class="form-control" readonly>
        </div>

        <div class="mb-3">
        <label>Treatment</label>
        <input type="text" value="{{ treatment.treatment_name }}" class="form-control" readonly>
        </div>

        <div class="mb-3">
            <label>Date</label>
            {{ form.date }}
        </div>

        <div class="mb-3">
            <label>Time Slot</label>
            {{ form.time_slot }}
        </div>

        <div class="mb-3">
            <label>Consultation Fee</label>
            <strong>500</strong>
        </div>

        <button type="submit" class="btn btn-success">
            Book Appointment
        </button>

    </form>

</div>

</div>
{% endblock %}
