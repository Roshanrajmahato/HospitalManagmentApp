<!-- templates/components/cards/appointment-card.html -->

<div class="card card-appointment h-100">
    <div class="card-body">
        <div class="d-flex justify-content-between align-items-start mb-3">
            <h5 class="card-title">{{ appointment.treatment }}</h5>
            <span class="badge badge-warning">{{ appointment.get_status_display|default:"Pending" }}</span>
        </div>

        <ul class="list-unstyled text-muted small">
            <li class="mb-2">
                <i class="bi bi-person-fill"></i>
                <strong>Doctor:</strong> {{ appointment.doctor }}
            </li>
            <li class="mb-2">
                <i class="bi bi-calendar-event"></i>
                <strong>Date:</strong> {{ appointment.date|date:"M d, Y" }}
            </li>
            <li class="mb-2">
                <i class="bi bi-clock"></i>
                <strong>Time:</strong> {{ appointment.time_slot }}
            </li>
            <li>
                <i class="bi bi-cash-coin"></i>
                <strong>Fee:</strong> ₹{{ appointment.consultation_fee }}
            </li>
        </ul>
    </div>

    <div class="card-footer bg-light">
        <button class="btn btn-warning btn-sm w-100" onclick="alert('Reschedule feature coming soon')">
            <i class="bi bi-pencil"></i> Reschedule
        </button>
    </div>
</div>
