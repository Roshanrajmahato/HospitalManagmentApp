{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

<div class="card p-4">

    <h3 class="text-center mb-4">
        List of All Lab Tests
    </h3>

    <table class="table table-bordered table-striped">

        <thead class="table-dark">

            <tr>

                <th>Test Name</th>

                <th>Price</th>

                <th>Time</th>

            </tr>

        </thead>

        <tbody>

            {% for test in tests %}

            <tr>

                <td>
                    {{ test.name }}
                </td>

                <td>
                    ₹ {{ test.price }}
                </td>

                <td>
                    {{ test.time }}
                </td>

            </tr>

            {% endfor %}

        </tbody>

    </table>

</div>

</div>

{% endblock %}
